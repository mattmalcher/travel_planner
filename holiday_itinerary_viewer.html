
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Itinerary Viewer</title>
<h2 class="sr-only">Holiday itinerary viewer — upload a HolidayItinerary JSON to explore timeline, budget and map views</h2>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.34.0/dist/tabler-icons.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link rel="stylesheet" href="viewer.css"/>

<div id="hupl" style="padding:2.5rem 1.5rem">
  <div style="text-align:center;margin-bottom:1.75rem">
    <div style="font-size:17px;font-weight:500;margin-bottom:4px">Itinerary viewer</div>
    <div style="font-size:13px;color:var(--color-text-secondary)">Load any <code>HolidayItinerary</code> JSON file to view timeline, budget and map</div>
  </div>
  <div class="hdrop" id="hdz" onclick="document.getElementById('hfile').click()">
    <i class="ti ti-file-import" style="font-size:28px;color:var(--color-text-secondary);display:block;margin-bottom:10px" aria-hidden="true"></i>
    <p style="font-size:14px;font-weight:500;margin-bottom:4px">Drop your itinerary JSON here</p>
    <p style="font-size:12px;color:var(--color-text-secondary)">or click to browse</p>
  </div>
  <div style="text-align:center;display:flex;gap:8px;justify-content:center">
    <input type="file" id="hfile" accept=".json" style="display:none">
    <button onclick="document.getElementById('hfile').click()"><i class="ti ti-upload" aria-hidden="true"></i> Browse</button>
  </div>
</div>

<div id="happ" style="display:none">
  <div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem 1.25rem;border-bottom:.5px solid var(--color-border-tertiary)">
    <div>
      <div id="htname" style="font-size:15px;font-weight:500"></div>
      <div id="htmeta" style="font-size:12px;color:var(--color-text-secondary);margin-top:2px;display:flex;gap:12px"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button id="hedit-toggle" onclick="hToggleEdit()" style="font-size:12px" title="Toggle edit mode"><i class="ti ti-pencil" aria-hidden="true"></i></button>
      <button onclick="hDownload()" style="font-size:12px" title="Download JSON"><i class="ti ti-download" aria-hidden="true"></i></button>
      <button onclick="hreset()" style="font-size:12px"><i class="ti ti-refresh" aria-hidden="true"></i> New file</button>
    </div>
  </div>
  <div style="display:flex;border-bottom:.5px solid var(--color-border-tertiary);padding:0 1.25rem">
    <div class="htab on" data-v="list" onclick="hsw('list')"><i class="ti ti-list-details" aria-hidden="true"></i> Timeline</div>
    <div class="htab" data-v="budget" onclick="hsw('budget')"><i class="ti ti-coins" aria-hidden="true"></i> Budget</div>
    <div class="htab" data-v="map" onclick="hsw('map')"><i class="ti ti-map-2" aria-hidden="true"></i> Map</div>
    <div class="htab" data-v="gantt" onclick="hsw('gantt')"><i class="ti ti-chart-gantt" aria-hidden="true"></i> Gantt</div>
  </div>
  <div id="hvlist" class="hv on" style="padding:1.25rem;max-width:760px"></div>
  <div id="hvbudget" class="hv" style="padding:1.25rem;max-width:760px"></div>
  <div id="hvmap" class="hv" style="padding:1.25rem">
    <div style="display:flex;gap:8px;font-size:11px;color:var(--color-text-secondary);margin-bottom:8px;align-items:center">
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#4b5563;display:inline-block"></span>Station</span>
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#b45309;display:inline-block"></span>Stay</span>
      <span style="display:inline-flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:50%;background:#15803d;display:inline-block"></span>Event</span>
    </div>
    <div id="hmap" style="width:100%;height:440px;border-radius:var(--border-radius-lg);border:.5px solid var(--color-border-tertiary)"></div>
    <div id="hmaplist" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(175px,1fr));gap:8px;margin-top:1rem"></div>
  </div>
  <div id="hvgantt" class="hv" style="padding:0"></div>
</div>

<div id="hedit-modal" onclick="if(event.target===this)hCloseEdit()">
  <div id="hedit-inner">
    <div id="hedit-hd">
      <span style="font-size:13px;font-weight:500" id="hedit-title">Edit</span>
      <button onclick="hCloseEdit()" style="font-size:12px;padding:2px 6px"><i class="ti ti-x" aria-hidden="true"></i></button>
    </div>
    <textarea id="hedit-ta" spellcheck="false"></textarea>
    <div id="hedit-ft">
      <span id="hedit-err"></span>
      <button onclick="hCloseEdit()" style="font-size:12px">Cancel</button>
      <button onclick="hSaveEdit()" style="font-size:12px;font-weight:500">Save</button>
    </div>
  </div>
</div>

<script src="viewer.js"></script>
