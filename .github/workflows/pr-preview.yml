name: PR Preview

# Publishes a live preview of the itinerary viewer for each pull request into a
# subfolder of the gh-pages branch, then comments the URL on the PR. All previews
# share the github.io origin (and therefore browser localStorage) — the app's
# hSchemaVersion guard handles data written by a different version.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build preview
        # Emits dist/holiday_itinerary_viewer.html (+ index.html copy) and
        # copies the schema alongside it.
        run: |
          npm ci
          npm run build

      - name: Deploy to gh-pages subfolder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: previews/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const sha = context.sha.slice(0, 7);
            // Re-deploys overwrite the file at a stable path, but GitHub Pages
            // serves HTML with Cache-Control: max-age=600 behind a CDN, so the
            // old build keeps loading from cache after review changes. The ?v=
            // commit stamp gives every redeploy a fresh URL that can't be
            // served stale (issue #29).
            const url = `https://${owner}.github.io/${repo}/previews/pr-${issue_number}/holiday_itinerary_viewer.html?v=${sha}`;
            const marker = '<!-- pr-preview-url -->';
            const body = [
              marker,
              `### 📄 Preview ready`,
              ``,
              `**[Open the itinerary viewer](${url})**`,
              ``,
              `Built from \`${sha}\`. Note: previews share the \`github.io\` origin, so they share browser localStorage (API key + saved itinerary) with each other and the live site.`,
            ].join('\n');
            // Delete any prior preview comment, then post a fresh one. Editing
            // in place is silent (no notification, comment stays put), so a
            // redeploy is easy to miss; a new comment surfaces it and pings
            // subscribers, while the delete keeps just one preview comment in
            // the thread (issue #29).
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            for (const c of comments) {
              if (c.user.type === 'Bot' && c.body.includes(marker)) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
              }
            }
            await github.rest.issues.createComment({ owner, repo, issue_number, body });

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview folder from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
        continue-on-error: true
      - name: Delete preview and push
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf "previews/pr-${{ github.event.pull_request.number }}"
          git add -A
          git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}" || echo "nothing to remove"
          git push
