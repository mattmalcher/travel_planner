name: PR Preview

# Publishes a live preview of the itinerary viewer for each pull request into a
# subfolder of the gh-pages branch, then comments the URL on the PR. All previews
# share the github.io origin (and therefore browser localStorage) — the app's
# hSchemaVersion guard handles data written by a different version.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage preview files
        run: |
          mkdir -p preview
          cp holiday_itinerary_viewer.html holiday_itinerary_schema.json preview/
          # Open the viewer by default when visiting the preview folder.
          cp holiday_itinerary_viewer.html preview/index.html

      - name: Deploy to gh-pages subfolder
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./preview
          destination_dir: previews/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Comment preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const url = `https://${owner}.github.io/${repo}/previews/pr-${issue_number}/holiday_itinerary_viewer.html`;
            const marker = '<!-- pr-preview-url -->';
            const body = [
              marker,
              `### 📄 Preview ready`,
              ``,
              `**[Open the itinerary viewer](${url})**`,
              ``,
              `Built from \`${context.sha.slice(0, 7)}\`. Note: previews share the \`github.io\` origin, so they share browser localStorage (API key + saved itinerary) with each other and the live site.`,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

  cleanup:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Remove preview folder from gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
        continue-on-error: true
      - name: Delete preview and push
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf "previews/pr-${{ github.event.pull_request.number }}"
          git add -A
          git commit -m "Remove preview for PR #${{ github.event.pull_request.number }}" || echo "nothing to remove"
          git push
