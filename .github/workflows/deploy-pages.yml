name: Deploy site

# Publishes the production itinerary viewer to the root of the gh-pages branch on
# every push to main. Uses keep_files so the previews/ subfolders created by the
# PR Preview workflow are preserved. Set GitHub Pages → Source to the gh-pages branch.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build site
        # Emits dist/holiday_itinerary_viewer.html (+ index.html copy) and
        # copies the schema alongside it.
        run: |
          npm ci
          npm run build

      - name: Publish to gh-pages root
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          keep_files: true
